name: Playwright Tests

on:
  push:
    branches: [main, master, qa-framework-improvements]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tags:
        description: "Run tests matching tag (e.g. @smoke, @regression)"
        required: false
        default: ""

env:
  ORANGE_USERNAME: ${{ secrets.ORANGE_USERNAME }}
  ORANGE_PASSWORD: ${{ secrets.ORANGE_PASSWORD }}

jobs:
  # ── UI + API Tests ──────────────────────────────────────────────────────────
  test:
    name: Playwright Tests (${{ matrix.project }})
    timeout-minutes: 60
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project: [chromium, api]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests – ${{ matrix.project }}
        run: |
          if [ -n "${{ github.event.inputs.tags }}" ]; then
            npx playwright test --project=${{ matrix.project }} --grep "${{ github.event.inputs.tags }}"
          else
            npx playwright test --project=${{ matrix.project }}
          fi
        env:
          CI: true

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results-${{ matrix.project }}
          path: allure-results/
          retention-days: 7

      - name: Upload test artifacts (traces, screenshots, videos)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts-${{ matrix.project }}
          path: test-results/
          retention-days: 7

  # ── Allure Report Generation ───────────────────────────────────────────────
  allure-report:
    name: Generate Allure Report
    needs: test
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure results (chromium)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-chromium
          path: allure-results/
        continue-on-error: true

      - name: Download Allure results (api)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
        continue-on-error: true

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure HTML report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
